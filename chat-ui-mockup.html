<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI RAG Agent</title>
        <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <style>
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: #e5e7eb;
                border-radius: 10px;
            }
        </style>
    </head>
    <body
        class="bg-gray-100 text-gray-800 h-screen flex flex-col font-sans antialiased overflow-hidden"
    >
        <header
            class="bg-white/80 backdrop-blur-sm border-b border-gray-100 p-3 shrink-0 z-10"
        >
            <div class="max-w-3xl mx-auto flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div
                        class="w-9 h-9 rounded-2xl bg-gray-900 flex items-center justify-center text-white shadow-sm"
                    >
                        <i class="fa-solid fa-microchip text-sm"></i>
                    </div>
                    <div>
                        <h1
                            class="font-semibold text-sm text-gray-900 tracking-tight"
                        >
                            AI RAG Agent
                        </h1>
                        <p class="text-[11px] text-gray-400">
                            Inventory Module • DummyJSON
                        </p>
                    </div>
                </div>
                <div
                    class="flex items-center gap-1.5 px-2.5 py-1 bg-gray-50 border border-gray-200 rounded-full"
                >
                    <div
                        class="w-1.5 h-1.5 bg-gray-500 rounded-full animate-pulse"
                    ></div>
                    <span
                        class="text-[10px] font-medium text-gray-500 uppercase tracking-wider"
                        >Ready</span
                    >
                </div>
            </div>
        </header>

        <main
            class="flex-1 overflow-y-auto p-4 scroll-smooth"
            id="chatContainer"
        >
            <div class="max-w-3xl mx-auto flex flex-col gap-5" id="chatBox">
                <div class="flex gap-3 items-end w-full max-w-[85%]">
                    <div
                        class="w-7 h-7 rounded-full bg-white border border-gray-200 shrink-0 flex items-center justify-center text-gray-600 shadow-sm mb-1"
                    >
                        <i class="fa-solid fa-shield-dog text-xl"></i>
                    </div>
                    <div
                        class="bg-white border border-gray-100 rounded-2xl rounded-bl-sm px-4 py-3 text-sm text-gray-600 shadow-sm leading-relaxed"
                    >
                        <p>
                            ระบบพร้อมทำงานครับ
                            วันนี้มีสินค้าหมวดไหนที่อยากให้ผมช่วยค้นหาจากฐานข้อมูลไหมครับ?
                        </p>
                    </div>
                </div>
            </div>
        </main>

        <footer
            class="bg-white p-3 shrink-0 shadow-[0_-4px_20px_-10px_rgba(0,0,0,0.05)]"
        >
            <div class="max-w-3xl mx-auto">
                <form
                    id="chatForm"
                    class="relative flex items-end gap-2 bg-gray-50 border border-gray-200 rounded-3xl transition-all focus-within:border-gray-400 focus-within:bg-white shadow-inner"
                >
                    <textarea
                        id="userInput"
                        rows="1"
                        class="w-full bg-transparent py-3 pl-5 pr-12 text-sm focus:outline-none resize-none placeholder-gray-400"
                        placeholder="ค้นหาสินค้า เช่น 'อยากได้ลิปติกสีแดงแบบ เริ่ด เลยล่ะ'..."
                    ></textarea>
                    <button
                        type="submit"
                        class="absolute right-1.5 bottom-1.5 p-2 bg-gray-900 hover:bg-gray-800 text-white rounded-full transition-transform active:scale-95 flex items-center justify-center"
                    >
                        <i
                            class="fa-solid fa-paper-plane text-[13px] -translate-x-[1px] translate-y-[1px]"
                        ></i>
                    </button>
                </form>
            </div>
        </footer>

        <script>
            const chatForm = document.getElementById("chatForm");
            const userInput = document.getElementById("userInput");
            const chatBox = document.getElementById("chatBox");
            const chatContainer = document.getElementById("chatContainer");

            userInput.addEventListener("input", function () {
                this.style.height = "auto";
                let newHeight = this.scrollHeight;
                if (newHeight > 100) newHeight = 100;
                this.style.height = newHeight + "px";
            });

            chatForm.addEventListener("submit", function (e) {
                e.preventDefault();
                const message = userInput.value.trim();
                // จัดการ Validation เงียบๆ ตรงนี้ ถ้าว่างก็แค่ไม่ทำอะไร
                if (!message) return;

                appendUserMessage(message);
                userInput.value = "";
                userInput.style.height = "auto";

                showTypingIndicator();

                setTimeout(() => {
                    removeTypingIndicator();
                    const mockAiResponse = `
                    <p class="mb-3 text-gray-600">เจอสินค้าที่น่าจะตรงกับความต้องการของคุณครับ ลองดูตัวนี้ไหม:</p>
                    <div class="bg-gray-50 border border-gray-100 rounded-xl p-2.5 flex gap-3 items-center hover:bg-gray-100 transition-colors cursor-pointer">
                        <div class="w-14 h-14 bg-white rounded-lg border border-gray-200 overflow-hidden shrink-0 flex items-center justify-center">
                            <img src="https://cdn.dummyjson.com/products/images/beauty/Essence%20Mascara%20Lash%20Princess/thumbnail.png" alt="Product" class="w-full h-full object-contain">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-medium text-sm text-gray-900 truncate">Essence Mascara Lash Princess</h3>
                            <p class="text-[11px] text-gray-500 mt-0.5">Category: Beauty | <i class="fa-solid fa-star text-yellow-400"></i> 4.9</p>
                            <p class="font-semibold text-sm text-gray-900 mt-1">$9.99</p>
                        </div>
                    </div>
                `;
                    appendAiMessage(mockAiResponse);
                }, 1200);
            });

            userInput.addEventListener("keydown", function (e) {
                if (e.key === "Enter" && !e.shiftKey) {
                    e.preventDefault();
                    chatForm.dispatchEvent(new Event("submit"));
                }
            });

            function appendUserMessage(text) {
                const userHtml = `
                <div class="flex gap-3 items-end w-full max-w-[85%] self-end flex-row-reverse">
                    <div class="w-7 h-7 rounded-full bg-gray-200 shrink-0 flex items-center justify-center text-gray-500 mb-1">
                        <i class="fa-solid fa-user text-lg"></i>
                    </div>
                    <div class="bg-gray-800 text-white rounded-2xl rounded-br-sm px-4 py-3 text-sm leading-relaxed shadow-sm">
                        <p>${escapeHTML(text)}</p>
                    </div>
                </div>
            `;
                chatBox.insertAdjacentHTML("beforeend", userHtml);
                scrollToBottom();
            }

            function appendAiMessage(htmlContent) {
                const aiHtml = `
                <div class="flex gap-3 items-end w-full max-w-[85%]">
                    <div class="w-7 h-7 rounded-full bg-white border border-gray-200 shrink-0 flex items-center justify-center text-gray-600 shadow-sm mb-1">
                        <i class="fa-solid fa-shield-dog text-xl"></i>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-2xl rounded-bl-sm px-4 py-3 text-sm text-gray-700 shadow-sm leading-relaxed w-full">
                        ${htmlContent}
                    </div>
                </div>
            `;
                chatBox.insertAdjacentHTML("beforeend", aiHtml);
                scrollToBottom();
            }

            function showTypingIndicator() {
                const typingHtml = `
                <div id="typingIndicator" class="flex gap-3 items-end w-full max-w-[85%]">
                    <div class="w-7 h-7 rounded-full bg-white border border-gray-200 shrink-0 flex items-center justify-center text-gray-600 shadow-sm mb-1">
                        <i class="fa-solid fa-shield-dog text-xl"></i>
                    </div>
                    <div class="bg-white border border-gray-100 rounded-2xl rounded-bl-sm px-4 py-4 shadow-sm flex items-center gap-1.5">
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                        <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
                    </div>
                </div>
            `;
                chatBox.insertAdjacentHTML("beforeend", typingHtml);
                scrollToBottom();
            }

            function removeTypingIndicator() {
                const indicator = document.getElementById("typingIndicator");
                if (indicator) indicator.remove();
            }

            function scrollToBottom() {
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }

            function escapeHTML(str) {
                return str.replace(
                    /[&<>'"]/g,
                    (tag) =>
                        ({
                            "&": "&amp;",
                            "<": "&lt;",
                            ">": "&gt;",
                            "'": "&#39;",
                            '"': "&quot;",
                        })[tag],
                );
            }
        </script>
    </body>
</html>
